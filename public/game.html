<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avalon Arena - 对局</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; margin: 0; background: #070c1a; color: #e8ecff; }
      header { padding: 16px 20px; background: #0f1733; border-bottom: 1px solid rgba(255,255,255,.08); display: flex; gap: 12px; align-items: center; justify-content: space-between; }
      a { color: #9fb2ff; text-decoration: none; }
      .wrap { display: grid; grid-template-columns: 460px 1fr; min-height: calc(100vh - 58px); }
      .wrap.layout-god {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: calc(100vh - 58px);
        min-height: 0;
      }
      .wrap.layout-god .panel { border-right: none; border-bottom: 1px solid rgba(255,255,255,.08); min-height: 0; overflow: auto; }
      .wrap.layout-god .main { min-height: 0; overflow: auto; }
      .wrap.layout-god #seatsGrid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .wrap.layout-god #chatCard { height: auto; }
      .wrap.layout-god #chatBox { max-height: 420px; }
      .panel { padding: 16px 20px; border-right: 1px solid rgba(255,255,255,.08); background: #0d1430; overflow: auto; }
      .main { padding: 16px 20px; overflow: auto; }
      .card { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.10); border-radius: 12px; padding: 12px; margin-bottom: 12px; }
      .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      input, select, button, textarea { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); color: #e8ecff; padding: 8px 10px; border-radius: 10px; }
      button { cursor: pointer; }
      button.primary { background: #2f5cff; border-color: rgba(255,255,255,.18); }
      button:disabled { opacity: .5; cursor: not-allowed; }
      textarea { width: 100%; min-height: 70px; resize: vertical; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New"; font-size: 12px; }
      .pill { display: inline-flex; padding: 2px 8px; border-radius: 999px; border: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.06); font-size: 12px; }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .chat { display: grid; grid-template-columns: 1fr; gap: 6px; max-height: 420px; overflow: auto; padding-right: 4px; }
      .chat-item { padding: 8px 10px; border-radius: 10px; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); }
      .muted { color: rgba(232,236,255,.70); }
      .alignment-good { color: #39d98a; font-weight: 750; }
      .alignment-evil { color: #ff4d4f; font-weight: 750; }
      .title { font-size: 14px; font-weight: 650; }
      pre { margin: 0; }
      .seat-card { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.10); border-radius: 12px; padding: 10px 10px; }
      .seat-top { display: flex; align-items: center; gap: 10px; }
      .avatar {
        width: 34px; height: 34px; border-radius: 999px;
        display: inline-flex; align-items: center; justify-content: center;
        font-weight: 750; color: rgba(255,255,255,.95);
        border: 1px solid rgba(255,255,255,.18);
        user-select: none;
      }
      .avatar.small { width: 26px; height: 26px; font-size: 12px; }
      .seat-title { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; line-height: 1.15; }
      .seat-title .who { font-weight: 750; }
      .kv { margin-top: 8px; display: grid; gap: 4px; }
      .kv .line { color: rgba(232,236,255,.72); font-size: 12px; }
      .chat-head { display: flex; align-items: center; gap: 10px; }
      .chat-meta { display: flex; gap: 10px; flex-wrap: wrap; align-items: baseline; }
      .chat-meta .who { font-weight: 750; }
      .status-table-wrap {
        margin-top: 8px;
        margin-bottom: 10px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,.14);
        background:
          radial-gradient(900px 220px at 20% -40%, rgba(47,92,255,.22), transparent 65%),
          radial-gradient(700px 200px at 110% 0%, rgba(57,217,138,.12), transparent 60%),
          rgba(255,255,255,.04);
        box-shadow: 0 0 0 1px rgba(255,255,255,.05) inset, 0 12px 30px rgba(0,0,0,.35);
        overflow: hidden;
      }
      .status-table { width: 100%; border-collapse: separate; border-spacing: 0; }
      .status-table th, .status-table td { padding: 8px 10px; font-size: 12px; }
      .status-table th {
        text-align: left;
        font-weight: 780;
        letter-spacing: .10em;
        text-transform: uppercase;
        color: rgba(232,236,255,.70);
        background: rgba(255,255,255,.03);
        border-bottom: 1px solid rgba(255,255,255,.10);
      }
      .status-table td {
        border-bottom: 1px solid rgba(255,255,255,.08);
        color: rgba(238,241,255,.95);
      }
      .status-table tr:last-child td { border-bottom: none; }
      .status-glow {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New";
        text-shadow:
          0 0 10px rgba(120,160,255,.55),
          0 0 22px rgba(120,160,255,.25),
          0 0 34px rgba(120,160,255,.18);
      }
      .status-table td.status-phase { color: rgba(198,214,255,.98); }
      .status-table td.status-leader { color: rgba(232,236,255,.98); }
      .status-table td.status-pending { color: rgba(228,255,244,.95); text-shadow: 0 0 10px rgba(57,217,138,.35), 0 0 22px rgba(57,217,138,.16), 0 0 34px rgba(57,217,138,.10); }
      @media (max-width: 1100px) {
        .wrap { grid-template-columns: 1fr; }
        .panel { border-right: none; border-bottom: 1px solid rgba(255,255,255,.08); }
      }
      @media (max-width: 900px) {
        .wrap.layout-god #seatsGrid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      @media (max-width: 600px) {
        .wrap.layout-god #seatsGrid { grid-template-columns: 1fr; }
      }

      /* === 统一聊天时间线条目样式 === */
      .timeline-item { padding: 8px 10px; border-radius: 10px; margin-bottom: 6px; }
      .timeline-item.thinking {
        background: rgba(100,80,220,.06);
        border: 1px solid rgba(100,80,220,.15);
        border-left: 3px solid rgba(100,80,220,.50);
      }
      .timeline-item.public_chat {
        background: rgba(57,217,138,.04);
        border: 1px solid rgba(57,217,138,.12);
        border-left: 3px solid rgba(57,217,138,.45);
      }
      .timeline-item.system {
        background: rgba(255,255,255,.05);
        border: 1px solid rgba(255,255,255,.08);
      }
      .timeline-head {
        display: flex; align-items: center; gap: 8px;
        flex-wrap: wrap; margin-bottom: 6px;
      }
      .timeline-head .who { font-weight: 750; font-size: 13px; }
      .timeline-head .phase-tag {
        display: inline-flex; padding: 1px 7px; border-radius: 999px;
        font-size: 11px; background: rgba(100,80,220,.18);
        border: 1px solid rgba(100,80,220,.30); color: #b8c4ff;
      }
      .timeline-body {
        font-size: 13px; line-height: 1.6;
        color: rgba(232,236,255,.90);
        white-space: pre-wrap; word-break: break-word;
      }
      .thinking-body {
        font-size: 13px; line-height: 1.65;
        color: #39d98a;
        white-space: pre-wrap; word-break: break-word;
      }
      .thinking-action {
        margin-top: 8px; padding: 6px 10px;
        border-radius: 8px;
        background: rgba(47,92,255,.10);
        border: 1px solid rgba(47,92,255,.25);
        font-size: 12px; color: #9fb2ff;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New";
      }

      /* === 玩家列表折叠样式 === */
      .seats-toggle {
        display: flex; align-items: center; gap: 8px;
        cursor: pointer; user-select: none;
      }
      .seats-toggle .arrow { transition: transform .2s; font-size: 10px; }
      .seats-toggle .arrow.open { transform: rotate(90deg); }
      #seatsGrid.collapsed { display: none; }
      .seats-card.collapsed { padding-bottom: 0; margin-bottom: 0; }
      .seats-card.collapsed .seats-toggle { margin-bottom: 0; }

      /* === 上帝控制按钮 === */
      .god-controls { display: none; gap: 8px; align-items: center; }
      .wrap.layout-god .god-controls { display: flex; }
      .god-btn {
        padding: 6px 16px; border-radius: 8px; font-size: 13px; font-weight: 650;
        cursor: pointer; border: 1px solid rgba(255,255,255,.15);
        transition: background .15s, border-color .15s;
      }
      .god-btn.pause {
        background: rgba(255,180,50,.15); border-color: rgba(255,180,50,.40); color: #ffb432;
      }
      .god-btn.pause:hover { background: rgba(255,180,50,.25); }
      .god-btn.pause.active {
        background: rgba(57,217,138,.15); border-color: rgba(57,217,138,.40); color: #39d98a;
      }
      .god-btn.end {
        background: rgba(255,77,79,.15); border-color: rgba(255,77,79,.40); color: #ff4d4f;
      }
      .god-btn.end:hover { background: rgba(255,77,79,.25); }
    </style>
  </head>
  <body>
    <header>
      <div class="row">
        <a href="/" class="pill">返回首页</a>
        <a href="/llm.html" class="pill">LLM配置</a>
        <a href="/replay.html" class="pill">对局回放</a>
        <span id="viewPill" class="pill">未连接</span>
      </div>
      <div class="row">
        <div class="god-controls" id="godControls">
          <button class="god-btn pause" id="pauseBtn">暂停</button>
          <button class="god-btn end" id="endBtn">结束游戏</button>
        </div>
        <span class="pill mono" id="roomPill">房间：-</span>
        <span class="pill mono" id="seatPill">座位：-</span>
      </div>
    </header>

    <div class="wrap" id="appWrap">
      <aside class="panel">
        <div class="card" id="connectCard">
          <div class="title">连接</div>
          <div class="muted" style="margin-top: 6px; font-size: 12px">支持 URL 参数：?roomId=...&token=...</div>
          <div class="row" style="margin-top: 10px">
            <input id="roomIdInput" class="mono" placeholder="roomId" style="flex: 1" />
          </div>
          <div class="row" style="margin-top: 10px">
            <input id="tokenInput" class="mono" placeholder="token" style="flex: 1" />
          </div>
          <div class="row" style="margin-top: 10px">
            <button id="connectBtn" class="primary">连接WS</button>
          </div>
        </div>

        <div class="card seats-card">
          <div class="seats-toggle" id="seatsToggle">
            <span class="arrow open" id="seatsArrow">&#9654;</span>
            <div class="title">玩家</div>
            <span class="pill" id="seatsCount">-</span>
          </div>
          <div class="grid" id="seatsGrid"></div>
        </div>
      </aside>

      <main class="main">
        <div class="card" id="phaseCard">
          <div class="title">阶段 / 任务</div>
          <div class="row" style="margin-top: 10px">
            <span class="pill" id="phasePill">阶段：-</span>
            <span class="pill" id="leaderPill">队长：-</span>
            <span class="pill" id="scorePill">比分：-</span>
          </div>
          <div class="row" style="margin-top: 8px">
            <span class="pill" id="progressPill" style="border-color: rgba(57,217,138,.35); color: rgba(57,217,138,.95);">总进度：-</span>
          </div>
          <div class="muted" style="margin-top: 10px" id="scenarioBox">-</div>
        </div>

        <div class="card" id="actionCard">
          <div class="title">操作</div>
          <div class="row" style="margin-top: 10px">
            <input id="teamInput" class="mono" placeholder="提名队伍，如: 1,3,5" style="flex: 1" />
            <button id="proposeBtn">提名</button>
          </div>
          <div class="row" style="margin-top: 10px">
            <input id="reasonInput" placeholder="可选：一句话理由（提名/投票）" style="flex: 1" />
          </div>
          <div class="row" style="margin-top: 10px">
            <button id="approveBtn">投赞成</button>
            <button id="rejectBtn">投反对</button>
            <button id="questSuccessBtn">任务成功</button>
            <button id="questFailBtn">任务失败</button>
          </div>
          <div class="row" style="margin-top: 10px">
            <input id="assassinateInput" class="mono" placeholder="刺杀目标 seatNo" style="width: 180px" />
            <button id="assassinateBtn">刺杀</button>
          </div>
        </div>

        <div class="card" id="chatCard">
          <div class="title">聊天</div>
          <div class="status-table-wrap" aria-label="当前状态">
            <table class="status-table" id="statusTable">
              <thead>
                <tr>
                  <th style="width: 120px">阶段</th>
                  <th style="width: 110px">队长</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="status-glow status-phase" id="statusPhase">-</td>
                  <td class="status-glow status-leader" id="statusLeader">-</td>
                  <td class="status-glow status-pending" id="statusPending">-</td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- 统一聊天时间线 -->
          <div class="chat" id="chatBox"></div>
          <div class="row" style="margin-top: 10px" id="chatInputRow">
            <input id="chatInput" placeholder="输入发言..." style="flex: 1" />
            <button id="sendChatBtn" class="primary">发送</button>
          </div>
        </div>
      </main>
    </div>

    <footer style="width:100%;text-align:center;padding:16px;font-size:12px;color:rgba(232,236,255,.30);">作者：无涯 &copy; 2026 Avalon Agent Arena</footer>

    <script type="module" src="/game.js"></script>
  </body>
</html>
